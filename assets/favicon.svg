<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Dark background -->
  <rect width="192" height="192" fill="#000000"/>
  
  <!-- Purple gradient circle for accent -->
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a4bff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <circle cx="96" cy="96" r="85" fill="url(#purpleGrad)" stroke="#6a4bff" stroke-width="2"/>
  
  <!-- Text "Aa" -->
  <text x="96" y="130" font-family="Quicksand, sans-serif" font-size="90" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2">Aa</text>
</svg>